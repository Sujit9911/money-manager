spring.application.name=moneymanager

# MySQL (local dev only)
spring.datasource.url=jdbc:mysql://localhost:3306/moneymanager?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.servlet.context-path=/api/v1.0
server.port=8080

# Email (local - still using SMTP for dev)
spring.mail.from=your-local-email@gmail.com

# Brevo API (used in prod via application-prod.properties)
brevo.api.key=local-placeholder

# JWT
jwt.secret=${JWT_TOKEN}
jwt.expiration=86400000

# URLs
money.manager.frontend.url=${FRONTEND_URL}
app.activation.url=${BACKEND_URL}

spring.profiles.active=prod